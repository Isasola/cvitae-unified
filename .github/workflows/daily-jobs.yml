name: Daily Job Update
on:
  schedule:
    - cron: '0 0 1,10,20 * *'
  workflow_dispatch:

# Conceder permiso de escritura al token del workflow
permissions:
  contents: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Update Script
        run: node scripts/update-opportunities-script.mjs
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          FINDWORK_API_KEY: ${{ secrets.FINDWORK_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}

      - name: Commit updated opportunities
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/opportunities.json
          git diff --staged --quiet || git commit -m "chore: update opportunities [skip ci]"
          git pull --rebase origin main
          git push origin main
